<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Source Access</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0c0c0c;
    --card-bg: rgba(255,255,255,0.04);
    --card-border: rgba(255,255,255,0.08);
    --input-bg: rgba(255,255,255,0.05);
    --input-border: rgba(255,255,255,0.1);
    --input-focus: rgba(255,255,255,0.28);
    --text-dim: rgba(255,255,255,0.4);
    --text-muted: rgba(255,255,255,0.2);
    --green: #4ade80;
  }

  html, body { height: 100%; }

  body {
    min-height: 100vh;
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: #f5f5f5;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .grid {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    animation: drift 24s linear infinite;
    z-index: 0;
  }
  @keyframes drift {
    from { background-position: 0 0; }
    to   { background-position: 48px 48px; }
  }
  .vignette {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse 80% 70% at 50% 50%, transparent 0%, #0c0c0c 76%);
    z-index: 1;
  }

  .wrapper {
    position: relative; z-index: 10;
    width: 100%; max-width: 400px;
    padding: 1.5rem 1.25rem;
  }

  .screen { display: none; flex-direction: column; align-items: center; }
  .screen.active {
    display: flex;
    animation: up 0.55s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes up {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .mark {
    width: 48px; height: 48px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.13);
    background: rgba(255,255,255,0.04);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 14px;
    animation: breathe 3.5s ease-in-out infinite;
  }
  @keyframes breathe {
    0%,100% { box-shadow: none; }
    50%      { box-shadow: 0 0 24px rgba(255,255,255,0.09); }
  }

  .brand-name {
    font-size: 20px; font-weight: 600;
    letter-spacing: -0.3px; color: #fff; margin-bottom: 4px;
  }
  .brand-sub {
    font-size: 10.5px; font-family: 'DM Mono', monospace;
    color: var(--text-muted); letter-spacing: 0.13em; margin-bottom: 26px;
  }

  .card {
    width: 100%;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 1.75rem;
    position: relative; overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute; top: 0; left: 18%; right: 18%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.14), transparent);
  }

  .card-label {
    font-size: 10px; font-family: 'DM Mono', monospace;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 18px;
  }

  .field { margin-bottom: 12px; }
  .field-lbl {
    font-size: 11px; font-weight: 500; color: var(--text-dim);
    margin-bottom: 6px; display: flex; align-items: center; gap: 6px;
    font-family: 'DM Mono', monospace; letter-spacing: 0.06em;
  }
  .field-input {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    border-radius: 11px;
    padding: 11px 14px;
    font-size: 14px; font-family: 'DM Sans', sans-serif;
    color: #fff; outline: none;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
  }
  .field-input::placeholder { color: rgba(255,255,255,0.16); }
  .field-input:hover { border-color: rgba(255,255,255,0.16); }
  .field-input:focus {
    border-color: var(--input-focus);
    background: rgba(255,255,255,0.07);
    box-shadow: 0 0 0 3px rgba(255,255,255,0.05);
  }
  .field-input.err {
    border-color: rgba(255,90,90,0.6);
    box-shadow: 0 0 0 3px rgba(255,90,90,0.07);
    animation: shake 0.38s ease;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%      { transform: translateX(-5px); }
    75%      { transform: translateX(5px); }
  }

  .error-msg {
    font-size: 11px; font-family: 'DM Mono', monospace;
    color: rgba(255,110,110,0.85);
    margin-top: 10px; text-align: center;
    letter-spacing: 0.04em; display: none; line-height: 1.6;
  }

  .div-row { display: flex; align-items: center; gap: 10px; margin: 18px 0 16px; }
  .div-line { flex: 1; height: 1px; background: rgba(255,255,255,0.06); }
  .div-txt {
    font-size: 9.5px; font-family: 'DM Mono', monospace;
    letter-spacing: 0.12em; color: rgba(255,255,255,0.18);
  }

  .btn {
    width: 100%; padding: 12.5px;
    border-radius: 11px; font-size: 14px;
    font-family: 'DM Sans', sans-serif; font-weight: 600;
    cursor: pointer; border: none;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: opacity 0.18s, transform 0.14s, box-shadow 0.2s;
    letter-spacing: -0.1px;
  }
  .btn:active:not(:disabled) { transform: scale(0.982); }
  .btn-white { background: #fff; color: #0c0c0c; }
  .btn-white:hover:not(:disabled) { opacity: 0.89; box-shadow: 0 0 28px rgba(255,255,255,0.1); }
  .btn-white:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-ghost {
    background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.65);
    border: 1px solid rgba(255,255,255,0.08);
  }
  .btn-ghost:hover { background: rgba(255,255,255,0.09); }

  .status {
    display: flex; align-items: center; gap: 8px;
    margin-top: 14px; padding: 9px 13px;
    background: rgba(255,255,255,0.025);
    border: 1px solid rgba(255,255,255,0.055);
    border-radius: 10px;
    font-size: 10px; font-family: 'DM Mono', monospace;
    letter-spacing: 0.08em; color: var(--text-muted);
  }
  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 8px var(--green);
    animation: blink 2.4s ease-in-out infinite; flex-shrink: 0;
  }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.25;} }

  .footer {
    margin-top: 14px; font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: rgba(255,255,255,0.15); letter-spacing: 0.1em; text-align: center;
  }

  .spin {
    width: 15px; height: 15px;
    border: 2px solid rgba(0,0,0,0.15);
    border-top-color: #0c0c0c;
    border-radius: 50%;
    animation: spinning 0.65s linear infinite;
    display: none;
  }
  @keyframes spinning { to { transform: rotate(360deg); } }

  /* Confirm screen */
  .pfp-wrap { position: relative; margin-bottom: 18px; }
  .pfp-img {
    width: 82px; height: 82px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.15);
    object-fit: cover; background: rgba(255,255,255,0.06);
    display: block;
    animation: popIn 0.45s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes popIn {
    from { opacity:0; transform: scale(0.65); }
    to   { opacity:1; transform: scale(1); }
  }
  .pfp-ring {
    position: absolute; inset: -6px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.1);
    animation: ringPulse 2.6s ease-in-out infinite;
  }
  @keyframes ringPulse {
    0%,100% { transform: scale(1); opacity: 0.45; }
    50%      { transform: scale(1.08); opacity: 1; }
  }

  .confirm-name {
    font-size: 18px; font-weight: 600;
    color: #fff; margin-bottom: 3px; letter-spacing: -0.2px;
  }
  .confirm-sub {
    font-size: 11px; color: var(--text-dim);
    margin-bottom: 22px; font-family: 'DM Mono', monospace; letter-spacing: 0.1em;
  }
  .confirm-q {
    font-size: 13px; color: var(--text-dim);
    margin-bottom: 16px; text-align: center;
  }
  .btn-row { display: flex; gap: 10px; width: 100%; }
  .btn-row .btn { flex: 1; }

  /* Granted */
  .granted-ring {
    width: 60px; height: 60px; border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 16px;
    animation: breathe 2.5s ease-in-out infinite;
  }
  .granted-title { font-size: 18px; font-weight: 600; color: #fff; margin-bottom: 5px; }
  .granted-sub {
    font-size: 11px; font-family: 'DM Mono', monospace;
    color: var(--text-muted); letter-spacing: 0.12em;
  }

  /* Avatar placeholder skeleton */
  .pfp-skeleton {
    width: 82px; height: 82px; border-radius: 50%;
    background: linear-gradient(90deg, rgba(255,255,255,0.06) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.06) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    display: none;
  }
  @keyframes shimmer {
    from { background-position: 200% 0; }
    to   { background-position: -200% 0; }
  }
</style>
</head>
<body>

<div class="grid"></div>
<div class="vignette"></div>

<div class="wrapper">

  <!-- SCREEN 1: Login -->
  <div class="screen active" id="s-login">
    <div class="mark">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="3"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <div class="brand-name">Source Access</div>
    <div class="brand-sub">SECURE PORTAL · v2.4</div>

    <div class="card">
      <div class="card-label">Verify your identity</div>

      <div class="field">
        <div class="field-lbl">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
          </svg>
          Roblox Username
        </div>
        <input class="field-input" id="robloxInput" type="text" placeholder="Your Roblox username"
          autocomplete="off" spellcheck="false" onkeydown="if(event.key==='Enter')handleLogin()"/>
      </div>

      <div class="field">
        <div class="field-lbl">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          Discord Username
        </div>
        <input class="field-input" id="discordInput" type="text" placeholder="username or user#0000"
          autocomplete="off" spellcheck="false" onkeydown="if(event.key==='Enter')handleLogin()"/>
      </div>

      <div id="errMsg" class="error-msg"></div>

      <div class="div-row">
        <div class="div-line"></div>
        <span class="div-txt">CONTINUE</span>
        <div class="div-line"></div>
      </div>

      <button class="btn btn-white" id="loginBtn" onclick="handleLogin()">
        <div class="spin" id="spin"></div>
        <svg id="btnIco" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
          <polyline points="10 17 15 12 10 7"/>
          <line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
        <span id="btnTxt">Continue</span>
      </button>

      <div class="status">
        <div class="dot"></div>
        SYSTEMS ONLINE · ENCRYPTED
      </div>
    </div>
    <div class="footer">UNAUTHORIZED ACCESS IS PROHIBITED</div>
  </div>

  <!-- SCREEN 2: Confirm -->
  <div class="screen" id="s-confirm">
    <div class="pfp-wrap">
      <div class="pfp-skeleton" id="pfpSkeleton"></div>
      <img class="pfp-img" id="pfpImg" src="" alt="Roblox avatar" style="display:none;"/>
      <div class="pfp-ring"></div>
    </div>
    <div class="confirm-name" id="confirmName"></div>
    <div class="confirm-sub">ROBLOX ACCOUNT</div>
    <div class="card">
      <div class="confirm-q">Is this your account?</div>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="goBack()">Not me</button>
        <button class="btn btn-white" onclick="grantAccess()">Yes, that's me</button>
      </div>
    </div>
    <div class="footer" style="margin-top:14px;">Confirm before proceeding</div>
  </div>

  <!-- SCREEN 3: Granted -->
  <div class="screen" id="s-granted">
    <div class="granted-ring">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <div class="granted-title">Access Granted</div>
    <div class="granted-sub">IDENTITY VERIFIED</div>
  </div>

</div>

<script>
  function show(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function setError(msg) {
    const el = document.getElementById('errMsg');
    el.textContent = msg;
    el.style.display = msg ? 'block' : 'none';
  }

  function resetBtn() {
    document.getElementById('loginBtn').disabled = false;
    document.getElementById('spin').style.display = 'none';
    document.getElementById('btnIco').style.display = 'inline';
    document.getElementById('btnTxt').textContent = 'Continue';
  }

  async function handleLogin() {
    const robloxEl  = document.getElementById('robloxInput');
    const discordEl = document.getElementById('discordInput');
    setError('');

    let valid = true;
    [robloxEl, discordEl].forEach(el => {
      el.classList.remove('err');
      if (!el.value.trim()) {
        void el.offsetWidth;
        el.classList.add('err');
        valid = false;
        setTimeout(() => el.classList.remove('err'), 700);
      }
    });
    if (!valid) return;

    const username = robloxEl.value.trim();

    document.getElementById('loginBtn').disabled = true;
    document.getElementById('spin').style.display = 'block';
    document.getElementById('btnIco').style.display = 'none';
    document.getElementById('btnTxt').textContent = 'Looking up…';

    try {
      // ── Step 1: username → userId ──────────────────────────
      // Uses allorigins.win which reliably proxies JSON APIs
      const apiUrl = `https://users.roblox.com/v1/usernames/users`;
      const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(apiUrl)}`;

      const nameRes = await fetch(proxyUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ usernames: [username], excludeBannedUsers: false })
      });

      // allorigins doesn't support POST — fall back to GET-based lookup
      // Use the legacy get-by-username endpoint via allorigins GET
      const legacyUrl = `https://api.roblox.com/users/get-by-username?username=${encodeURIComponent(username)}`;
      const legacyProxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(legacyUrl)}`;

      const legacyRes = await fetch(legacyProxy);
      if (!legacyRes.ok) throw new Error('lookup_failed');

      const legacyData = await legacyRes.json();

      if (!legacyData.Id || legacyData.errorMessage) {
        setError('Roblox username not found. Double-check your spelling.');
        resetBtn();
        return;
      }

      const userId      = legacyData.Id;
      const displayName = legacyData.Username || username;

      // ── Step 2: userId → headshot via allorigins ───────────
      const thumbApiUrl = `https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${userId}&size=150x150&format=Png&isCircular=true`;
      const thumbProxy  = `https://api.allorigins.win/raw?url=${encodeURIComponent(thumbApiUrl)}`;

      const thumbRes  = await fetch(thumbProxy);
      if (!thumbRes.ok) throw new Error('thumb_failed');

      const thumbData = await thumbRes.json();
      const imageUrl  = thumbData?.data?.[0]?.imageUrl;

      if (!imageUrl) throw new Error('no_image');

      // ── Step 3: show confirm with pfp ──────────────────────
      document.getElementById('confirmName').textContent = displayName;

      // Show skeleton while image loads
      const skeleton = document.getElementById('pfpSkeleton');
      const img      = document.getElementById('pfpImg');
      skeleton.style.display = 'block';
      img.style.display      = 'none';

      resetBtn();
      show('s-confirm');

      // Load image — Roblox CDN image URLs are direct and don't need proxying
      img.onload = () => {
        skeleton.style.display = 'none';
        img.style.display      = 'block';
      };
      img.onerror = () => {
        // If direct load fails, try proxying the image URL too
        img.onerror = () => {
          skeleton.style.display = 'none';
          img.style.display      = 'block';
          img.src = `https://api.allorigins.win/raw?url=${encodeURIComponent(imageUrl)}`;
        };
        img.src = `https://api.allorigins.win/raw?url=${encodeURIComponent(imageUrl)}`;
      };
      img.src = imageUrl;

    } catch (err) {
      console.error(err);
      setError('Could not load profile. Check your connection and try again.');
      resetBtn();
    }
  }

  function goBack() {
    setError('');
    // Reset pfp state
    document.getElementById('pfpSkeleton').style.display = 'none';
    document.getElementById('pfpImg').style.display = 'none';
    document.getElementById('pfpImg').src = '';
    show('s-login');
  }

  function grantAccess() {
    show('s-granted');
  }
</script>
</body>
</html>
