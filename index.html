<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Source Access</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-fade"></div>

<div class="wrapper">

  <!-- ══════════════════════════════════════
       SCREEN 1 — Login
       ══════════════════════════════════════ -->
  <div class="screen active stagger" id="s-login">

    <div class="brand">
      <div class="brand-icon">
        <svg width="21" height="21" viewBox="0 0 24 24" fill="none"
             stroke="#0d0d0d" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="3"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <div class="brand-name">Source Access</div>
      <div class="brand-tag">Secure Portal &nbsp;·&nbsp; v2.4</div>
    </div>

    <div class="card">
      <div class="card-eyebrow">Verify your identity</div>

      <div class="field">
        <div class="field-label">Roblox Username</div>
        <div class="field-wrap">
          <input class="field-input" id="robloxInput" type="text"
            placeholder="Your Roblox username" autocomplete="off" spellcheck="false"/>
          <span class="field-icon">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7"/>
              <rect x="14" y="3" width="7" height="7"/>
              <rect x="14" y="14" width="7" height="7"/>
              <rect x="3" y="14" width="7" height="7"/>
            </svg>
          </span>
        </div>
      </div>

      <div class="field">
        <div class="field-label">Discord Username</div>
        <div class="field-wrap">
          <input class="field-input" id="discordInput" type="text"
            placeholder="username or user#0000" autocomplete="off" spellcheck="false"/>
          <span class="field-icon">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
          </span>
        </div>
      </div>

      <div class="error-msg" id="errMsg">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             style="flex-shrink:0">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span></span>
      </div>

      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">Continue</span>
        <div class="divider-line"></div>
      </div>

      <button class="btn btn-primary" id="loginBtn" onclick="handleLogin()">
        <div class="spinner" id="spinner"></div>
        <svg id="btnIcon" width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
          <polyline points="10 17 15 12 10 7"/>
          <line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
        <span id="btnText">Continue</span>
      </button>

      <div class="status-bar">
        <div class="pulse-dot"></div>
        Systems Online &nbsp;·&nbsp; Encrypted
      </div>
    </div>

    <div class="footer-note">Unauthorized access is prohibited</div>
  </div>


  <!-- ══════════════════════════════════════
       SCREEN 2 — Confirm
       ══════════════════════════════════════ -->
  <div class="screen" id="s-confirm">

    <div class="confirm-avatar-wrap">
      <div class="avatar-ring avatar-ring-1"></div>
      <div class="avatar-ring avatar-ring-2"></div>
      <div class="avatar-skeleton" id="avatarSkeleton" style="display:none;"></div>
      <img class="avatar-img" id="avatarImg" src="" alt="Roblox avatar" style="display:none;"/>
    </div>

    <div class="confirm-name" id="confirmName"></div>
    <div class="confirm-handle">Roblox Account</div>

    <div class="card" style="animation: fadeUp 0.55s var(--ease) 0.25s both; opacity:0;">
      <div class="confirm-question">Is this your account?</div>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="goBack()">Not me</button>
        <button class="btn btn-primary" onclick="grantAccess()">That's me</button>
      </div>
    </div>

    <div class="footer-note" style="animation: fadeUp 0.5s var(--ease) 0.35s both; opacity:0;">
      Confirm before proceeding
    </div>
  </div>


  <!-- ══════════════════════════════════════
       SCREEN 3 — Access Granted
       ══════════════════════════════════════ -->
  <div class="screen" id="s-granted">

    <div class="granted-check">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
           stroke="#0d0d0d" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline class="check-path" points="20 6 9 17 4 12"/>
      </svg>
    </div>

    <div class="granted-title">Access Granted</div>
    <div class="granted-sub">Identity Verified</div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
